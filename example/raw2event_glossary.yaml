# Hand-curated paperterm glossary for the Raw2Event NeurIPS 2026 paper.
#
# Provenance: derived from `example/output/glossary.draft.yaml` (the
# bootstrap dogfood output) by promoting a subset of high-confidence,
# high-drift concepts into the production schema:
#   - found_forms / confidence dropped (those are draft-only)
#   - canonical chosen per plan §1.1 phrasing where applicable
#   - other variants moved into `aliases` (or `allowed_forms` when the
#     short form is acceptable in tables/figures only)
#
# v0.1 limitation acknowledged: alias forms containing $...$ math
# delimiters cannot match yet (the LaTeX walker peels math out of the
# prose stream). Such forms are intentionally omitted from this file
# and will reappear once `math:` prefix support lands in a future
# paperterm phase.

version: 1

defaults:
  case_sensitive: false
  whole_word: true

concepts:
  # ------------------------------------------------------------------ #
  # plan §1.1 motivating example #1 — per-pixel EMD has 6 surface forms
  # ------------------------------------------------------------------ #
  - id: per_pixel_emd
    category: metric
    canonical: "per-pixel EMD"
    allowed_forms:
      - form: "px-EMD"
        contexts: [table, figure, caption]
    aliases:
      - form: "spatial per-pixel EMD"
      - form: "per-pixel count EMD"
      - form: "pixel-level EMD"
      - form: "spatial px-EMD"
        suggest: "px-EMD"

  # ------------------------------------------------------------------ #
  # plan §1.1 motivating example #2 — per-pair K calibration drift
  # (forms containing $K$ math symbol are deferred — see file header)
  # ------------------------------------------------------------------ #
  - id: per_pair_k_calibration
    category: pipeline
    canonical: "per-pair K calibration"
    aliases:
      - form: "per-pair calibration"
      - form: "per-camera-pair K calibration"

  # ------------------------------------------------------------------ #
  # Multiple names for the same upstream evaluation table
  # ------------------------------------------------------------------ #
  - id: upstream_diagnostic
    category: pipeline
    canonical: "upstream event-statistics diagnostic"
    aliases:
      - form: "upstream diagnostic"
      - form: "upstream event-statistics scorecard"
      - form: "upstream event-statistics diagnostic suite"
      - form: "upstream event-statistics table"

  # ------------------------------------------------------------------ #
  # DAVIS346 sensor: case-sensitive proper noun, common typos as aliases
  # ------------------------------------------------------------------ #
  - id: davis346
    category: dataset
    canonical: "DAVIS346"
    case_sensitive: true
    aliases:
      - form: "DAVIS-346"
      - form: "Davis346"
      - form: "davis346"

  # ------------------------------------------------------------------ #
  # DVS-Voltmeter: tolerated abbreviation in tables / figures only
  # ------------------------------------------------------------------ #
  - id: dvs_voltmeter
    category: model
    canonical: "DVS-Voltmeter"
    case_sensitive: true
    allowed_forms:
      - form: "DVS-V"
        contexts: [table, figure, caption]
    aliases:
      - form: "DVS Voltmeter"
      - form: "DVSVoltmeter"
